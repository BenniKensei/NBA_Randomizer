<!DOCTYPE html>
<html>
<head>
    <title>Firebase Connection Test</title>
</head>
<body>
    <h1>Firebase Connection Test</h1>
    <button onclick="testFirebase()">Test Create Game</button>
    <button onclick="testRead()">Test Read Games</button>
    <div id="result"></div>

    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
        import { getDatabase, ref, set, get } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js';

        const firebaseConfig = {
            apiKey: "AIzaSyA8wH4eZ-N77XAsohlHtGSeC1Gblb_F8YE",
            authDomain: "nba-randomizer.firebaseapp.com",
            databaseURL: "https://nba-randomizer-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "nba-randomizer",
            storageBucket: "nba-randomizer.firebasestorage.app",
            messagingSenderId: "705478088936",
            appId: "1:705478088936:web:682c0e6d7c7c65af53115d"
        };

        const app = initializeApp(firebaseConfig);
        const database = getDatabase(app);

        window.testFirebase = async function() {
            const result = document.getElementById('result');
            result.innerHTML = 'Testing...';
            
            try {
                const testId = 'TEST' + Date.now();
                const testRef = ref(database, `games/${testId}`);
                
                await set(testRef, {
                    gameId: testId,
                    test: true,
                    timestamp: Date.now()
                });
                
                result.innerHTML = `✅ SUCCESS! Created game: ${testId}`;
                console.log('Test successful!');
            } catch (error) {
                result.innerHTML = `❌ ERROR: ${error.message}`;
                console.error('Test failed:', error);
            }
        };

        window.testRead = async function() {
            const result = document.getElementById('result');
            result.innerHTML = 'Reading...';
            
            try {
                const gamesRef = ref(database, 'games');
                const snapshot = await get(gamesRef);
                
                if (snapshot.exists()) {
                    const games = snapshot.val();
                    const gameIds = Object.keys(games);
                    result.innerHTML = `✅ Found ${gameIds.length} games: ${gameIds.join(', ')}`;
                } else {
                    result.innerHTML = '⚠️ No games found in database';
                }
            } catch (error) {
                result.innerHTML = `❌ ERROR: ${error.message}`;
                console.error('Read failed:', error);
            }
        };
    </script>
</body>
</html>
